<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>La Liste Card Generator</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Montserrat, sans-serif;
      background: #f7f3ec;
      padding: 30px;
      color: #8b0f14;
    }

    .app {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }

    .panel {
      width: 320px;
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,.08);
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-top: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #cbb8a0;
      font-family: Montserrat;
    }

    button {
      margin-top: 22px;
      background: #b01920;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .card {
      width: 760px;
      height: 460px;
      border-radius: 28px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,.12), transparent 30%),
        linear-gradient(135deg, #9f1218, #6f080c);
      box-shadow: 0 18px 45px rgba(0,0,0,.35);
      color: #caa45a;
    }

    .card:before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(45deg, rgba(255,255,255,.025) 0, rgba(255,255,255,.025) 1px, transparent 1px, transparent 5px);
      opacity: .7;
    }

    .logo {
      position: absolute;
      top: 55px;
      left: 50%;
      transform: translateX(-50%);
      width: 310px;
      height: 92px;
      border: 3px solid #caa45a;
      clip-path: polygon(12% 0, 88% 0, 100% 50%, 88% 100%, 12% 100%, 0 50%);
      text-align: center;
      padding-top: 14px;
      box-sizing: border-box;
    }

    .logo-small {
      font-family: Bebas Neue;
      font-size: 22px;
      letter-spacing: 5px;
    }

    .logo-main {
      font-family: Bebas Neue;
      font-size: 54px;
      letter-spacing: 13px;
      line-height: 44px;
    }

    .la-liste {
      position: absolute;
      top: 180px;
      width: 100%;
      text-align: center;
      font-family: Bebas Neue;
      font-size: 34px;
      letter-spacing: 9px;
    }

    .guest-name {
      position: absolute;
      top: 255px;
      width: 100%;
      text-align: center;
      font-family: Montserrat, sans-serif;
      font-size: 38px;
      font-weight: 600;
      color: #d6b36c;
      text-shadow:
        1px 1px 0 #3d0506,
        -1px -1px 0 rgba(255,230,160,.35),
        0 4px 8px rgba(0,0,0,.45);
    }

    .member-since {
      position: absolute;
      left: 48px;
      bottom: 48px;
      font-family: Bebas Neue;
      font-size: 24px;
      letter-spacing: 4px;
    }

    .tier {
      position: absolute;
      right: 48px;
      bottom: 48px;
      text-align: right;
      font-family: Bebas Neue;
      font-size: 24px;
      letter-spacing: 4px;
    }

    .label {
      display: block;
      font-size: 15px;
      opacity: .8;
      letter-spacing: 3px;
    }
  </style>
</head>

<body>

  <h1>La Liste Card Generator</h1>

  <div class="app">
    <div class="panel">
      <label>Guest Name</label>
      <input id="guestName" value="Wladimir Guez" />

      <label>Membership Tier</label>
      <select id="tier">
        <option>La Liste</option>
        <option>La Liste Rouge</option>
        <option>La Liste Signature</option>
        <option>Cercle Sagana</option>
      </select>

      <label>Member Since</label>
      <input id="since" value="May 2026" />

      <button onclick="updateCard()">Create La Liste Membership</button>
      <button onclick="downloadCard()">Download PNG</button>
    </div>

    <div id="card" class="card">
      <div class="logo">
        <div class="logo-small">BRASSERIE</div>
        <div class="logo-main">SAGANA</div>
      </div>

      <div class="la-liste">LA LISTE</div>

      <div id="cardName" class="guest-name">Wladimir Guez</div>

      <div class="member-since">
        <span class="label">MEMBER SINCE</span>
        <span id="cardSince">MAY 2026</span>
      </div>

      <div class="tier">
        <span class="label">TIER</span>
        <span id="cardTier">LA LISTE</span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <script>
    function updateCard() {
      document.getElementById("cardName").innerText =
        document.getElementById("guestName").value;

      document.getElementById("cardTier").innerText =
        document.getElementById("tier").value.toUpperCase();

      document.getElementById("cardSince").innerText =
        document.getElementById("since").value.toUpperCase();
    }

    function downloadCard() {
      updateCard();

      html2canvas(document.getElementById("card"), {
        scale: 3,
        backgroundColor: null
      }).then(canvas => {
        const link = document.createElement("a");
        link.download = "la-liste-card.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    }
  </script>

</body>
</html>
